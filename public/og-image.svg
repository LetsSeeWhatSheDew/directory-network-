<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0f1f3d"/>

  <!-- subtle gradient glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#0f1f3d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- background cannabis leaf silhouette, low opacity -->
  <g transform="translate(600 340) scale(6.2)" fill="#4ade80" fill-opacity="0.055" stroke="#4ade80" stroke-opacity="0.06" stroke-width="0.6" stroke-linejoin="round">
    <path d="M0 0 Q-3 -40 -1 -78 Q0 -82 1 -78 Q3 -40 0 0 Z"/>
    <path d="M0 0 Q-22 -32 -40 -62 Q-43 -66 -38 -65 Q-14 -28 0 0 Z"/>
    <path d="M0 0 Q22 -32 40 -62 Q43 -66 38 -65 Q14 -28 0 0 Z"/>
    <path d="M0 0 Q-38 -20 -64 -34 Q-68 -36 -63 -32 Q-24 -10 0 0 Z"/>
    <path d="M0 0 Q38 -20 64 -34 Q68 -36 63 -32 Q24 -10 0 0 Z"/>
    <path d="M0 0 Q-32 -4 -50 -4 Q-54 -3 -48 -1 Q-22 2 0 0 Z"/>
    <path d="M0 0 Q32 -4 50 -4 Q54 -3 48 -1 Q22 2 0 0 Z"/>
    <path d="M0 0 Q-18 20 -32 38 Q-36 42 -30 38 Q-12 14 0 0 Z"/>
    <path d="M0 0 Q18 20 32 38 Q36 42 30 38 Q12 14 0 0 Z"/>
  </g>

  <!-- logo mark top-left -->
  <g transform="translate(80 70)">
    <rect x="0" y="0" width="56" height="56" rx="12" fill="#0b172f" stroke="rgba(255,255,255,.16)" stroke-width="1"/>
    <rect x="14" y="18" width="28" height="3.6" rx="1.8" fill="#ffffff"/>
    <rect x="14" y="26.4" width="28" height="3.6" rx="1.8" fill="#ffffff"/>
    <rect x="14" y="34.8" width="28" height="3.6" rx="1.8" fill="#ffffff"/>
    <circle cx="52" cy="4" r="10" fill="#4ade80" stroke="#0f1f3d" stroke-width="3"/>
    <text x="78" y="38" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="-1">
      clean<tspan fill="#4ade80">list</tspan>
    </text>
  </g>

  <!-- main headline -->
  <text x="600" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="104" font-weight="700" fill="#ffffff" letter-spacing="-3">
    Best Bud For Your Buck$
  </text>

  <!-- tagline -->
  <text x="600" y="390" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="400" fill="#4ade80" letter-spacing="-1">
    Low Prices. High Times.
  </text>

  <!-- footer caption -->
  <text x="600" y="560" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="0.04em">
    cleanlist.co — Illinois cannabis deals
  </text>
</svg>
