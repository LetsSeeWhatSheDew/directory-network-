<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" preserveAspectRatio="xMidYMid meet" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Geometric 7-leaflet cannabis silhouette. Stroke-only, currentColor.
       Used as a 96px tile at <=6% opacity on dark surfaces only. -->
  <g transform="translate(48 48)">
    <!-- center leaflet (longest, vertical) -->
    <path d="M0 -38 L-3 -16 L-1 -2 L0 6 L1 -2 L3 -16 Z"/>
    <!-- upper-right leaflet -->
    <path d="M0 -2 L18 -28 L13 -10 L9 -3 L4 0 Z"/>
    <!-- upper-left leaflet (mirror) -->
    <path d="M0 -2 L-18 -28 L-13 -10 L-9 -3 L-4 0 Z"/>
    <!-- middle-right leaflet -->
    <path d="M0 0 L26 -16 L18 -3 L11 4 L4 3 Z"/>
    <!-- middle-left leaflet -->
    <path d="M0 0 L-26 -16 L-18 -3 L-11 4 L-4 3 Z"/>
    <!-- lower-right leaflet -->
    <path d="M0 4 L18 6 L11 9 L5 8 Z"/>
    <!-- lower-left leaflet -->
    <path d="M0 4 L-18 6 L-11 9 L-5 8 Z"/>
    <!-- stem -->
    <path d="M0 6 L0 16"/>
  </g>
</svg>
